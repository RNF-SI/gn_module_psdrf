<div class="custom-toast">
  <div class="custom-toast-header">
    <strong class="mr-auto">{{ title }}</strong>
    <button type="button" class="close" (click)="remove()" aria-label="Fermer">
      <span aria-hidden="true">&times;</span>
    </button>
  </div>
  <div class="custom-toast-body">
    <div>
      <span class="error-line-title">Succès :</span> {{ success }}
    </div>
    <div>
      <span class="error-line-title">Message :</span> {{ message }}
    </div>
    <div *ngIf="errorDetail" class="actions">
      <button type="button" class="btn btn-light btn-sm" (click)="seeDetails($event)">
        {{ showErrorDetail ? 'Masquer les détails' : 'Voir les détails' }}
      </button>
      <button *ngIf="showErrorDetail" type="button" class="btn btn-light btn-sm" (click)="copyDetails($event)">
        Copier
      </button>
    </div>
    <pre *ngIf="showErrorDetail" class="error-detail">{{ errorDetail }}</pre>
  </div>
</div>
